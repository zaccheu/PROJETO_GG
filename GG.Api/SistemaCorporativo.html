		<div class="panel panel-default">
			<div class="panel-heading">
				<h3 class="panel-title text-center">CLIENTES CADASTRADOS</h3>
			</div>

			<div class="panel-body">
				<a data-toggle="modal"
				   data-target="#myModal"
				   class="btn btn-primary">
					<span class="glyphicon glyphicon-plus"
						  aria-hidden="true"></span>
					Novo
				</a>
				<div class="table-responsive">
					<table id="ListaCadastro"
						   class="table table-striped table-hover">
						<thead>
							<tr>
								<th>Id Cliente</th>
								<th>Documento</th>
								<th>NOME</th>
								<th>EMAIL</th>
								<th>TELEFONE</th>

	<script>
		ListarClientes();

		function ValidarCPF(cpf) {
			// Removendo pontos e traços usando expressão regular
			cpf = cpf.replace(/[.-]/g, '');

			if (cpf.length !== 11) {
				alert('CPF inválido. Deve conter 11 dígitos.');
				return false;
			}

			let sum = 0;
			let remainder;

			// Primeiro dígito verificador
			for (let i = 1; i <= 9; i++) {
				sum += parseInt(cpf.substring(i - 1, i)) * (11 - i);
			}
			remainder = (sum * 10) % 11;

			if ((remainder === 10) || (remainder === 11)) remainder = 0;
			if (remainder !== parseInt(cpf.substring(9, 10))) {
				alert('CPF inválido.');
				return false;
			}

			sum = 0;
			// Segundo dígito verificador
			for (let i = 1; i <= 10; i++) {
				sum += parseInt(cpf.substring(i - 1, i)) * (12 - i);
			}
			remainder = (sum * 10) % 11;

			if ((remainder === 10) || (remainder === 11)) remainder = 0;
			if (remainder !== parseInt(cpf.substring(10, 11))) {
				alert('CPF inválido.');
				return false;
			}
			return true;
		}

		function SalvarCadastro() {
			var cpf = documento = $("#Documento").val();
			var Clientes = {
				idCliente: $("#idCliente").val(),
				documento: $("#Documento").val(),
				nome: $("#nome").val(),
				sexo: $('input[name="sexo"]:checked').val(),
				email: $("#email").val(),
				telefone: $("#telefone").val(),
				fax: $("#fax").val(),
				uf: $("#uf").val()
			};

			if (Clientes.idCliente == "") {
				alert("O campo documento é obrigatório");
				$("#Documento").css("background-color", "red");
				return; // Para a execução
			}
			if (Clientes.documento == "") {
				alert("O campo documento é obrigatório");
				$("#Documento").css("background-color", "red");
				return; // Para a execução
			}
			if (!ValidarCPF(Clientes.documento)) {
				$("#Documento").css("background-color", "red");
				return; // Para a execução
			}
			else {
				$.ajax({
					type: "POST",
					url: "https://localhost:44344/api/Clientes/Salvar",
					data: JSON.stringify(Clientes),
					contentType: "application/json; charset=utf-8",
					dataType: "json",
					success: function (msg) {
						location.reload();
					},
					error: function (msg) {
						alert('error');
					},
				});
				AdicionarLinhaTabela(
					Clientes.idCliente,
					Clientes.documento,
					Clientes.nome,
					Clientes.email,
					Clientes.telefone
				);
				$("#myModal").modal().hide();
			}
		}

		function AdicionarLinhaTabela(IdCliente, Documento, Nome, Email, Telefone) {
			var linhaNova = '<tr id="Linha' + IdCliente + '"><td>';
			linhaNova = linhaNova + IdCliente + "</td><td>" + Documento + "</td><td>" + Nome + "</td><td>" + Email +
				"</td><td>" +
				Telefone +
				'</td><td><a href="#" onclick="javascript:GetClient(' +
				IdCliente +
				');"  class="btn btn-info"><span class="glyphicon glyphicon-edit" aria-hidden="true"></span> Editar</a><a href="#" onclick="confirmarExclusao(' +
				IdCliente + ', \'' + Nome + '\');" class="btn btn-danger"><span class="glyphicon glyphicon-trash" aria-hidden="true"></span> Excluir</a></td></tr>';

			//alert(linhaNova);
			$("#ListaCadastro").prepend(linhaNova); //prepend joga o novo registro no começo, o append é no final
			//a linha de cima ta inserindo um registro html através de uma função JS
			$("#myModal").modal().hide();
		}

		function LimparCamposForm() {
			$("#IdCliente").val(),
				$("#Documento").val("");
			$("#nome").val("");
			$("#sexo").val("");
			$("#email").val("");
			$("#telefone").val("");
			$("#fax").val("");
			$("#uf").val("");
		}

		function RemoveLinha(IdCliente) {
			$.ajax({
				type: "DELETE",
				url: "https://localhost:44344/api/Clientes/Deletar?IdCliente=" + IdCliente,
				contentType: "application/json; charset=utf-8",
				dataType: "json",
				success: function (OBJ) {
					alert("Exclusão feita.");
				},
				error: function (OBJ) {
					alert('error do remove');
				}
			});
			$('#Linha' + IdCliente).remove();
		}

		function GetClient(IdCliente) {
			$.ajax({
				type: "GET",
				url: "https://localhost:44344/api/Clientes/GetClient?IdCliente=" + IdCliente,
				contentType: "application/json; charset=utf-8",
				dataType: "json",
				success: function (OBJ) {
					$("#myModal").modal().show();
					$("#IdCliente").val(OBJ.idCliente);
					$("#Documento").val(OBJ.documento);
					$("#nome").val(OBJ.nome);
					$("input[name='sexo'][value='" + OBJ.sexo + "']").prop("checked", true);
					$("#email").val(OBJ.email);
					$("#telefone").val(OBJ.telefone);
					$("#fax").val(OBJ.fax);
					$("#uf").val(OBJ.uf);
					$("#Documento").data("editing", true); // Define um data attribute para indicar edição
				},
				error: function (OBJ) {
					alert('error do editar');
				}
			});
		}
		function confirmarExclusao(IdCliente, Nome) {
			// Solicita confirmação do usuário
			if (confirm("Tem certeza que deseja excluir " + Nome + "?")) {
				// Se o usuário confirmar, executa a função de exclusão
				RemoveLinha(IdCliente);
			} else {
				// Se o usuário cancelar, não faz nada
				alert("Exclusão cancelada.");
			}
		}

		function ListarClientes() {
			$.ajax({
				type: "GET",
				url: "https://localhost:44344/api/Clientes/Listar",
				contentType: "application/json; charset=utf-8",
				dataType: "json",
				success: function (OBJ) {
					for (var i = 0; i < OBJ.length; i++) {
						AdicionarLinhaTabela(OBJ[i].idCliente, OBJ[i].documento, OBJ[i].nome, OBJ[i].email, OBJ[i].telefone);
					}
				},
				error: function (OBJ) {
					alert('error do listar');
				}
			});
		}
	</script>
