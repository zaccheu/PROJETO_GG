<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Define uma altura fixa para o banner sem sobrecarregar a tela */
        .banner {
            max-height: 400px;
            overflow: hidden;
        }

        .banner img {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }

        /* Ajusta o layout do menu lateral */
        .menu-lateral {
            min-height: calc(100vh - 400px); /* Altura restante abaixo do banner */
        }

        /* Espaçamento interno para o menu lateral */
        .menu-lateral .list-group-item {
            padding: 15px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <!-- Conteúdo principal com menu lateral -->
    <div class="container-fluid">
        <div class="row">
            <!-- Menu Lateral -->
            <div class="col-md-3 menu-lateral">
                <div class="list-group">
                    <a href="pedido.html" class="list-group-item list-group-item-action">
                        <img src="../images/931949.png" alt="Pedidos" class="me-2"> Pedidos
                    </a>
                    <a href="estoque.html" class="list-group-item list-group-item-action">
                        <img src="../images/706164.png" alt="Estoque" class="me-2"> Estoque
                    </a>
                    <a href="fornecedores.html" class="list-group-item list-group-item-action">
                        <img src="../images/3321752.png" alt="Fornecedores" class="me-2"> Fornecedores
                    </a>
                    <a href="financeiro.html" class="list-group-item list-group-item-action">
                        <img src="../images/639365.png" alt="Financeiro" class="me-2"> Financeiro
                    </a>
                    <a href="cardapio.html" class="list-group-item list-group-item-action">
                        <img src="../images/1046747.png" alt="Cardápio" class="me-2"> Cardápio
                    </a>
                    <a href="clientes.html" class="list-group-item list-group-item-action">
                        <img src="../images/4149882.png" alt="Clientes" class="me-2"> Clientes
                    </a>
                </div>
            </div>

            <!-- Conteúdo principal -->
            <div class="col-md-9">
                <div class="container-fluid p-0 banner">
                    <img src="../images/Banner.png" alt="Chama os Amigos" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
