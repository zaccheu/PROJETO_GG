        function SalvarCadastro() {
            var Cliente = {
                nome: $("#Nome").val(),
                telefone: $("#Telefone").val(),
                instagram: $("#Instagram").val(),
                sexo: $('input[name="sexo"]:checked').val(),
                vip: $('input[name="VIP"]:checked').val() == "True"
            };
            //console.log(Cliente);

            if (Cliente.nome == "") {
                alert("O campo nome é obrigatório");
                $("#Nome").css("background-color", "red");
                return; // Para a execução
            }
            else {
                $.ajax({
                    type: "POST",
                    url: "https://localhost:44344/api/Clientes/Salvar",
                    data: JSON.stringify(Cliente),
                    contentType: "application/json; charset=utf-8",
                    dataType: "json",
                    success: function (msg) {
                        location.reload();
                    },
                    error: function (msg) {
                        alert('error do salvar');
                    },
                });
                AdicionarLinhaTabela(
                    Cliente.nome,
                    Cliente.telefone,
                    Cliente.instagram,
                    Cliente.sexo,
                    Cliente.vip
                );
                $("#myModal").modal().hide();
            }
        }

        function AdicionarLinhaTabela(Nome, Telefone, Instagram, Sexo, VIP) {
            var linhaNova = '<tr id="Linha' + Telefone + '"><td>';
            linhaNova = linhaNova + Nome + "</td><td>" + Telefone +
                "</td><td>" + Instagram + "</td><td>" +
                Sexo + "</td><td>" + VIP +
                '</td><td><a href="#" onclick="javascript:GetClient(' +
                Telefone + ');"  class="btn btn-info"><span class="glyphicon glyphicon-edit" aria-hidden="true"></span> Editar</a><a href="#" onclick="confirmarExclusao(' +
                Telefone + ', \'' + Nome + '\');" class="btn btn-danger"><span class="glyphicon glyphicon-trash" aria-hidden="true"></span> Excluir</a></td></tr>';

            //alert(linhaNova);
            $("#ListaCadastro").prepend(linhaNova); //prepend joga o novo registro no começo, o append é no final
            //a linha de cima ta inserindo um registro html através de uma função JS
            $("#myModal").modal().hide();
        }

        function LimparCamposForm() {
            $("#nome").val("");
            $("#sexo").val("");
            $("#telefone").val("");
            $("#sexo").val("");
            $("#VIP").val("");
        }

        function RemoveLinha(Telefone) {
            $.ajax({
                type: "DELETE",
                url: "https://localhost:44344/api/Clientes/Deletar?Telefone=" + Telefone,
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function (OBJ) {
                    alert("Exclusão feita.");
                },
                error: function (OBJ) {
                    alert('error do remove');
                }
            });
            $('#Linha' + Telefone).remove();
        }

        function GetClient(Telefone) {
            $.ajax({
                type: "GET",
                url: "https://localhost:44344/api/Clientes/GetClient?telefone=" + Telefone,
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function (OBJ) {
                    $("#myModal").modal().show();
                    $("#nome").val(OBJ.nome);
                    $("#telefone").val(OBJ.telefone);
                    $("#instagram").val(OBJ.instagram);
                    $('input[name="sexo"]:checked').val(OBJ.sexo);    
                    $('input[name="VIP"]:checked').val() == "True";
                    $("#telefone").data("editing", true); // Define um data attribute para indicar edição
                },
                error: function (OBJ) {
                    alert('error do editar');
                }
            });
        }
        function confirmarExclusao(Telefone, Nome) {
            // Solicita confirmação do usuário
            if (confirm("Tem certeza que deseja excluir " + Nome + "?")) {
                // Se o usuário confirmar, executa a função de exclusão
                RemoveLinha(Telefone);
            } else {
                // Se o usuário cancelar, não faz nada
                alert("Exclusão cancelada.");
            }
        }

        function ListarClientes() {
            $.ajax({
                type: "GET",
                url: "https://localhost:44344/api/Clientes/Listar",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function (OBJ) {
                    for (var i = 0; i < OBJ.length; i++) {
                        AdicionarLinhaTabela(OBJ[i].nome, OBJ[i].telefone, OBJ[i].instagram, OBJ[i].sexo, OBJ[i].vip);
                    }
                },
                error: function (OBJ) {
                    alert('error do listar');
                }
            });
        }
    </script>
